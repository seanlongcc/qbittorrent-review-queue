<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Review Queue Mockup Picker</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: oklch(16% 0.01 248);
        --ink: oklch(94% 0.011 86);
        --muted: oklch(72% 0.026 82);
        --panel: oklch(21% 0.013 246);
        --line: oklch(35% 0.019 246);
        --accent: oklch(75% 0.12 68);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
      }

      main {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 12px;
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 1rem;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      a {
        display: inline-flex;
        min-height: 32px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 10px;
        color: var(--ink);
        background: oklch(24% 0.014 246);
        text-decoration: none;
        font-weight: 700;
      }

      a:hover,
      a:focus-visible,
      a.active {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      iframe {
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 0;
        background: var(--bg);
      }

      @media (max-width: 720px) {
        header {
          align-items: start;
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Review Queue Mockups</h1>
        <nav aria-label="mockup variants">
          <a class="active" href="iron-ledger.html" target="preview">Iron Ledger</a>
          <a href="queue-control-redesign.html" target="preview">Queue Controls</a>
          <a href="qbittorrent-theme.html" target="preview">qBittorrent Theme</a>
          <a href="power-user.html" target="preview">Power User</a>
        </nav>
      </header>
      <iframe name="preview" title="mockup preview" src="iron-ledger.html"></iframe>
    </main>
    <script>
      document.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          document.querySelectorAll("a").forEach((item) => item.classList.remove("active"));
          link.classList.add("active");
        });
      });
    </script>
  </body>
</html>
